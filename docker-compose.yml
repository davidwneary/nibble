services:
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    env_file: .env
    environment:
      SYMPHONY_POLL_INTERVAL: "30"
      SYMPHONY_MAX_CONCURRENCY: "2"
      SYMPHONY_WORKSPACE_ROOT: /workspaces
    volumes:
      - workspaces:/workspaces
      - ./WORKFLOW.md:/app/WORKFLOW.md:ro
      - ./AGENTS.md:/app/AGENTS.md:ro
    restart: unless-stopped

volumes:
  workspaces:
