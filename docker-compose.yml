services:
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    env_file: .env
    environment:
      SYMPHONY_POLL_INTERVAL: "30"
      SYMPHONY_MAX_CONCURRENCY: "2"
      SYMPHONY_WORKSPACE_ROOT: /workspaces
    volumes:
      - workspaces:/workspaces
      - ./WORKFLOW.md:/app/WORKFLOW.md:ro
      - ./AGENTS.md:/app/AGENTS.md:ro
    restart: unless-stopped

  copilot-shell:
    image: nibble-orchestrator:latest
    profiles: [shell]
    stdin_open: true
    tty: true
    env_file: .env
    environment:
      REPO_URL: https://github.com/davidwneary/nibble.git
    command: >-
      bash -c "git clone $$REPO_URL /workspaces/nibble &&
      exec gh copilot -- -C /workspaces/nibble --allow-all --model claude-sonnet-4.5"

volumes:
  workspaces:
