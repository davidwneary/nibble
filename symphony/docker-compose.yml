version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: symphony
      POSTGRES_USER: symphony
      POSTGRES_PASSWORD: symphony_local
    ports:
      - "5433:5432"
    volumes:
      - symphony_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U symphony"]
      interval: 5s
      timeout: 5s
      retries: 5

  symphony:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://symphony:symphony_local@db:5432/symphony
      SYMPHONY_REPO_URL: git@github.com:davidwneary/nibble.git
      SYMPHONY_REPO_BRANCH: main
      SYMPHONY_POLL_INTERVAL: "30"
      SYMPHONY_MAX_CONCURRENCY: "2"
      SYMPHONY_WORKSPACE_ROOT: /workspaces
    volumes:
      - workspaces:/workspaces
      - ~/.ssh:/root/.ssh:ro
    restart: unless-stopped

volumes:
  symphony_data:
  workspaces:
